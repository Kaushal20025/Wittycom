<!DOCTYPE html>
<html>
<head>
  <title>PDF Preview</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .pdf-container {
      width: 100%;
      height: 100%;
    }

    .pdf-preview {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="pdf-container">
    <iframe class="pdf-preview" src="notes.pdf"></iframe>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var iframe = document.querySelector('.pdf-preview');
      iframe.onload = function () {
        // Disable the context menu (right-click menu) on the iframe
        iframe.contentDocument.addEventListener('contextmenu', function (event) {
          event.preventDefault();
        });

        // Disable the default behavior of the Save As context menu option
        iframe.contentDocument.addEventListener('keydown', function (event) {
          if (event.ctrlKey && event.key === 's') {
            event.preventDefault();
          }
        });

        // Disable the Print option in the browser's print dialog
        iframe.contentWindow.addEventListener('beforeprint', function (event) {
          event.preventDefault();
        });
      };
    });
  </script>
</body>
</html>
